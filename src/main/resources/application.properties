spring.application.name=attachment-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:fortivus}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

seaweedfs.s3.endpoint=http://localhost:8333
seaweedfs.s3.access-key=some_access_key1
seaweedfs.s3.secret-key=some_secret_key1
seaweedfs.bucket=fortivus-attachments
