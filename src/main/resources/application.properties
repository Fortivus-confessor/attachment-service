spring.application.name=attachment-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:fortivus}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

seaweedfs.s3.endpoint=${SEAWEEDFS_S3_ENDPOINT:http://localhost:8333}
seaweedfs.s3.access-key=${S3_ACCESS_KEY:any}
seaweedfs.s3.secret-key=${S3_SECRET_KEY:any}
seaweedfs.bucket=fortivus-attachments
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:9000/realms/fortivus}
